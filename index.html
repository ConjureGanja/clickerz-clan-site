<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ============================================================
         SITE METADATA
         TODO: Replace the og:image and og:url values with real ones
         once you have a deployed URL. The og:image should be a
         1200x630px banner image (great for Discord link previews).
         ============================================================ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Clickerz CC — a non-toxic Old School RuneScape clan built for chill adventurers. Weekly SOOTW & BOTW events, Bingo, and more. Join us today!"
    />
    <meta name="keywords" content="OSRS clan, Old School RuneScape clan, Clickerz CC, OSRS community, non-toxic OSRS, SOOTW, BOTW" />
    <meta name="theme-color" content="#0d0b07" />

    <!-- Open Graph / Discord / social share tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Clickerz CC | OSRS Clan" />
    <meta property="og:description" content="A chill, non-toxic Old School RuneScape clan. Weekly events, great community." />
    <!-- TODO: Replace with your deployed URL -->
    <meta property="og:url" content="https://yoursite.com" />
    <!-- TODO: Replace with a real banner image path once you have one.
         Recommended size: 1200x630px. Store it in /public/og-banner.png -->
    <!-- <meta property="og:image" content="https://yoursite.com/og-banner.png" /> -->

    <!-- Twitter card tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Clickerz CC | OSRS Clan" />
    <meta name="twitter:description" content="A chill, non-toxic Old School RuneScape clan. Weekly events, great community." />

    <!-- ============================================================
         FAVICON
         TODO: Replace /vite.svg with your own clan logo/icon.
         A 32x32 or 64x64 .png works well. Drop it in /public/
         and update the href below.
         ============================================================ -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- ============================================================
         FONTS
         Using Cinzel (medieval/fantasy headings) and Crimson Text
         (elegant readable body) from Google Fonts for an OSRS feel.
         If you want to change fonts, replace the family params below.
         ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <title>Clickerz CC | OSRS Clan</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
